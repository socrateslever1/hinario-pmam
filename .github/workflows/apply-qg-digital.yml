name: Apply QG Digital interface

on:
  push:
    branches:
      - feat/qg-digital-role-portfolio
    paths:
      - .github/workflows/apply-qg-digital.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reorganize interface and branding
        shell: python
        run: |
          from pathlib import Path

          def replace(path_name, old, new, count=None):
              path = Path(path_name)
              text = path.read_text(encoding="utf-8-sig")
              if old not in text:
                  raise SystemExit(f"Trecho não encontrado em {path_name}: {old[:100]!r}")
              text = text.replace(old, new, -1 if count is None else count)
              path.write_text(text, encoding="utf-8")

          # Marca principal.
          for filename in [
              "client/index.html",
              "client/public/manifest.json",
              "client/src/components/Navbar.tsx",
              "client/src/components/Footer.tsx",
              "client/src/components/BottomNavigation.tsx",
          ]:
              path = Path(filename)
              text = path.read_text(encoding="utf-8-sig")
              text = text.replace("Meu Quartel", "QG Digital")
              text = text.replace("MEU QUARTEL", "QG DIGITAL")
              text = text.replace("Plataforma Digital PMAM", "Plataforma Militar")
              text = text.replace("Plataforma digital PMAM", "Plataforma Militar")
              path.write_text(text, encoding="utf-8")

          # Aluno: ocultar Estudos e Ordem Unida da navegação visual.
          navbar = Path("client/src/components/Navbar.tsx")
          text = navbar.read_text(encoding="utf-8")
          text = text.replace('  { href: "/drill", label: "Ordem Unida", icon: Target },\n', '')
          text = text.replace('  { href: "/estudos", label: "Centro de Estudos", icon: BookOpenCheck },\n', '')
          # Alto Comando: Documentos sai da barra principal; permanece nos menus secundários.
          command_documents = '        { href: "/documentos", label: "Documentos", icon: FileText },\n'
          text = text.replace(command_documents, '', 1)
          navbar.write_text(text, encoding="utf-8")

          bottom = Path("client/src/components/BottomNavigation.tsx")
          text = bottom.read_text(encoding="utf-8")
          text = text.replace('        { icon: BookOpen, label: "Estudos", path: "/estudos" },\n', '        { icon: LayoutGrid, label: "Sala", path: "/sala-de-aula" },\n')
          text = text.replace('        { icon: Target, label: "Ordem Unida", path: "/drill" },\n', '')
          text = text.replace('Sobre o QG Digital', 'QG Digital')
          bottom.write_text(text, encoding="utf-8")

          # Página inicial: retirar Estudos do acesso rápido do aluno e do destaque.
          home = Path("client/src/pages/Home.tsx")
          text = home.read_text(encoding="utf-8")
          text = text.replace(
              '  { icon: BookOpen, value: "08", label: "Estudos", desc: "Módulos CFAP", href: "/estudos" },',
              '  { icon: ClipboardList, value: "01", label: "Sala", desc: "Rotina do pelotão", href: "/sala-de-aula" },'
          )
          text = text.replace(
              '''  {
              badge: "Estudo e Mérito",
              title: "Canções, Notas",
              highlight: "e Estudos",
              text: "Acesse hinos, Charlie Mike, biblioteca de estudos, notas do curso e materiais de consulta em uma experiência mobile unificada.",
              href: "/estudos",
              action: "Abrir Estudos",
              icon: BookOpen,
            },''',
              '''  {
              badge: "Utilitário Militar",
              title: "Setores digitais",
              highlight: "para a rotina real",
              text: "Acesse sala, escalas, documentos, efetivo, notas, comunicações e serviços conforme sua função e competência.",
              href: "/sobre",
              action: "Conhecer o QG Digital",
              icon: ClipboardList,
            },'''
          )
          text = text.replace(
              '        { icon: BookOpen, value: "08", label: "Estudos", desc: "Módulos CFAP", href: "/estudos" },',
              '        { icon: LayoutGrid, value: "10", label: "Setores", desc: "Áreas de trabalho", href: "/sobre" },'
          )
          home.write_text(text, encoding="utf-8")

          # Portfólio completo e filtrado por perfil.
          about = '''import Navbar from "@/components/Navbar";
          import Footer from "@/components/Footer";
          import { Card, CardContent } from "@/components/ui/card";
          import { Badge } from "@/components/ui/badge";
          import { trpc } from "@/lib/trpc";
          import { getStudentSession } from "@/lib/studentSession";
          import {
            Bell, BookOpenCheck, BriefcaseBusiness, ClipboardList, FileText,
            GraduationCap, LayoutGrid, ListMusic, Music, Scale, Shield,
            Target, UserCog, Users, WalletCards
          } from "lucide-react";

          const BRASAO_URL = "/logo/IMG_7728.PNG";

          const COMMAND_ROLES = new Set([
            "master", "admin", "comandante_corpo", "subcomandante_corpo",
            "sub_comandante_corpo", "comandante_cfap", "subcomandante_cfap",
            "sub_comandante_cfap", "comandante_cia", "comandante_pel",
          ]);

          type PortfolioItem = {
            title: string;
            description: string;
            icon: typeof Shield;
            audience: Array<"public" | "student" | "command" | "highCommand">;
            status?: "active" | "planned" | "hidden";
          };

          const portfolio: PortfolioItem[] = [
            { title: "Sala de Aula Digital", description: "Mapa de sala, carteiras, efetivo, condições, funções e rotina do pelotão.", icon: LayoutGrid, audience: ["student", "command", "highCommand"] },
            { title: "Escalas e Serviço", description: "Escala semanal, quartos de hora, limpeza, serviço e organização operacional.", icon: ClipboardList, audience: ["student", "command", "highCommand"] },
            { title: "Notas do Curso", description: "Consulta individual de notas, disciplinas, desempenho e classificação acadêmica.", icon: GraduationCap, audience: ["student", "command", "highCommand"] },
            { title: "Documentos do Aluno", description: "Envio, acompanhamento e consulta de partes e documentos pessoais.", icon: FileText, audience: ["student"] },
            { title: "Documentos Recebidos", description: "Triagem, análise, aprovação e acompanhamento dos documentos enviados pelos alunos.", icon: FileText, audience: ["command", "highCommand"] },
            { title: "FO, LC e Disciplina", description: "Registro, provas, acompanhamento, homologação e controle disciplinar conforme competência.", icon: Scale, audience: ["command", "highCommand"] },
            { title: "FATD e Procedimentos", description: "Fluxo administrativo disciplinar, instrução, decisão, histórico e delegações de competência.", icon: BriefcaseBusiness, audience: ["highCommand"], status: "planned" },
            { title: "Pecúlio", description: "Controle financeiro, lançamentos, fechamento, consulta e prestação de contas.", icon: WalletCards, audience: ["command", "highCommand"] },
            { title: "Efetivo", description: "Situação do efetivo por companhia, pelotão, condição e destino.", icon: Users, audience: ["command", "highCommand"] },
            { title: "Usuários e Acessos", description: "Criação de contas, funções, escopos e futura delegação granular de competência.", icon: UserCog, audience: ["highCommand"] },
            { title: "Comunicados e Avisos", description: "Publicação e recebimento de notícias, orientações e avisos institucionais.", icon: Bell, audience: ["student", "command", "highCommand"] },
            { title: "Hinos e Canções", description: "Catálogo institucional de hinos, canções militares, orações e tradições.", icon: Music, audience: ["public", "student", "command", "highCommand"] },
            { title: "Charlie Mike", description: "Áudios e cadências para treinamento e formação militar.", icon: ListMusic, audience: ["public", "student", "command", "highCommand"] },
            { title: "CFAP 2026", description: "Missões, informações, comunicados e conteúdos ligados ao curso de formação.", icon: Shield, audience: ["student", "command", "highCommand"] },
            { title: "Centro de Estudos", description: "Módulos, questões e materiais acadêmicos. Temporariamente oculto no painel do aluno.", icon: BookOpenCheck, audience: ["highCommand"], status: "hidden" },
            { title: "Ordem Unida", description: "Simulação e consulta de movimentos. Temporariamente oculta no painel do aluno.", icon: Target, audience: ["highCommand"], status: "hidden" },
          ];

          export default function About() {
            const student = getStudentSession();
            const { data: user } = trpc.auth.me.useQuery();
            const { data: access } = trpc.serviceScale.myAccess.useQuery(undefined, { enabled: Boolean(user) });

            const isCommand = Boolean(user?.role && COMMAND_ROLES.has(user.role));
            const isHighCommand = Boolean(
              user?.role && [
                "master", "admin", "comandante_corpo", "subcomandante_corpo",
                "sub_comandante_corpo", "comandante_cfap", "subcomandante_cfap",
                "sub_comandante_cfap"
              ].includes(user.role)
            );

            const audience: "public" | "student" | "command" | "highCommand" =
              student ? "student" : isHighCommand ? "highCommand" : isCommand ? "command" : "public";
            const visibleItems = portfolio.filter((item) => item.audience.includes(audience));

            const profileLabel = student
              ? "Visão do aluno"
              : isHighCommand
                ? "Visão do Alto Comando"
                : isCommand
                  ? `Visão de comando${access?.role ? ` — ${access.role}` : ""}`
                  : "Visão pública";

            return (
              <div className="mobile-safe-bottom min-h-screen bg-[#061019] text-white">
                <Navbar />
                <main>
                  <section className="border-b border-white/10 px-4 py-10">
                    <div className="container mx-auto max-w-6xl">
                      <div className="grid items-center gap-8 md:grid-cols-[1fr_auto]">
                        <div>
                          <Badge className="mb-4 border-[#c4a84b]/30 bg-[#c4a84b]/10 text-[#e5c65d]">{profileLabel}</Badge>
                          <h1 className="font-serif text-4xl font-black leading-tight md:text-6xl">QG Digital</h1>
                          <p className="mt-2 text-xl font-bold text-[#c4a84b]">Plataforma Militar</p>
                          <p className="mt-5 max-w-3xl text-base leading-relaxed text-white/70 md:text-lg">
                            Um utilitário institucional que reproduz setores reais de trabalho em ambiente digital. Cada usuário visualiza somente os serviços compatíveis com sua função, seu setor e sua competência.
                          </p>
                        </div>
                        <img src={BRASAO_URL} alt="Brasão PMAM" className="mx-auto h-40 w-40 object-contain opacity-90 md:h-52 md:w-52" />
                      </div>
                    </div>
                  </section>

                  <section className="px-4 py-10">
                    <div className="container mx-auto max-w-6xl">
                      <div className="mb-7">
                        <p className="text-xs font-black uppercase tracking-[0.22em] text-[#c4a84b]">Portfólio por competência</p>
                        <h2 className="mt-2 text-3xl font-black">Seus setores e utilitários</h2>
                        <p className="mt-2 text-white/60">A lista abaixo já está filtrada conforme o perfil atualmente autenticado.</p>
                      </div>
                      <div className="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
                        {visibleItems.map((item) => {
                          const Icon = item.icon;
                          return (
                            <Card key={item.title} className="border-white/10 bg-white/[0.045] text-white shadow-xl">
                              <CardContent className="p-5">
                                <div className="mb-4 flex items-start justify-between gap-3">
                                  <span className="flex h-11 w-11 items-center justify-center rounded-xl border border-[#c4a84b]/20 bg-[#c4a84b]/10 text-[#e5c65d]">
                                    <Icon className="h-5 w-5" />
                                  </span>
                                  {item.status && (
                                    <Badge variant="outline" className="border-white/15 text-[10px] text-white/60">
                                      {item.status === "planned" ? "Planejado" : "Oculto temporariamente"}
                                    </Badge>
                                  )}
                                </div>
                                <h3 className="text-lg font-black">{item.title}</h3>
                                <p className="mt-2 text-sm leading-relaxed text-white/60">{item.description}</p>
                              </CardContent>
                            </Card>
                          );
                        })}
                      </div>
                    </div>
                  </section>

                  <section className="border-y border-white/10 bg-[#0a281c] px-4 py-10">
                    <div className="container mx-auto grid max-w-6xl gap-6 md:grid-cols-3">
                      <div><p className="text-3xl font-black text-[#e5c65d]">1 plataforma</p><p className="mt-1 text-sm text-white/60">Vários setores digitais integrados.</p></div>
                      <div><p className="text-3xl font-black text-[#e5c65d]">Acesso por função</p><p className="mt-1 text-sm text-white/60">Cada perfil vê apenas o que precisa executar.</p></div>
                      <div><p className="text-3xl font-black text-[#e5c65d]">Rotina real</p><p className="mt-1 text-sm text-white/60">Processos militares transformados em utilitários práticos.</p></div>
                    </div>
                  </section>
                </main>
                <Footer />
              </div>
            );
          }
          '''
          Path("client/src/pages/About.tsx").write_text(about.replace("          ", ""), encoding="utf-8")

          # Ajustes finais de metadados.
          index = Path("client/index.html")
          text = index.read_text(encoding="utf-8")
          text = text.replace("QG Digital - Plataforma Digital PMAM", "QG Digital - Plataforma Militar")
          text = text.replace("Meu Quartel - Plataforma Digital PMAM", "QG Digital - Plataforma Militar")
          index.write_text(text, encoding="utf-8")

          manifest = Path("client/public/manifest.json")
          text = manifest.read_text(encoding="utf-8")
          text = text.replace("QG Digital - Plataforma Digital PMAM", "QG Digital - Plataforma Militar")
          text = text.replace("Meu Quartel - Plataforma Digital PMAM", "QG Digital - Plataforma Militar")
          manifest.write_text(text, encoding="utf-8")

          Path(".github/workflows/apply-qg-digital.yml").unlink()

      - uses: pnpm/action-setup@v4
        with:
          version: 10.4.1
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build

      - name: Commit validated interface
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(qg): role-based portfolio and utility interface"
          git push origin feat/qg-digital-role-portfolio
